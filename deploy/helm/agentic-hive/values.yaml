replicaCount: 1

image:
  repository: registry.gitlab.com/adfinisde/agentic-workspace/agentic-hive
  tag: latest
  pullPolicy: IfNotPresent

auth:
  mode: local
  local:
    adminUsername: admin
  oidc:
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    redirectUrl: ""
    scopes: "openid,profile,email"
    rolesClaim: "groups"
    adminGroup: "overlay-admin"

keyStore:
  backend: local
  vault:
    address: ""
    authMethod: token
    token: ""
    secretPath: "secret/agentic-hive/ssh-keys"

config:
  sessionSecret: ""
  idleTimeout: 0
  pollInterval: 30

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: overlay.dev-ai.wisbric.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# PodDisruptionBudget
# Single replica with SQLite. PDB allows disruption since HA is not supported.
# maxUnavailable: 1 means node drain can proceed (pod may be evicted).
# Set maxUnavailable: 0 to prevent involuntary eviction and block node drain.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
