replicaCount: 1

image:
  repository: ghcr.io/wisbric/agentic-hive
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

auth:
  mode: local
  local:
    adminUsername: admin
  oidc:
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    redirectUrl: ""
    scopes: "openid,profile,email"
    rolesClaim: "groups"
    adminGroup: "overlay-admin"

keyStore:
  backend: local
  vault:
    address: ""
    authMethod: token
    token: ""
    secretPath: "agentic-hive/ssh-keys"

config:
  sessionSecret: ""
  # encryptionSecret: separate secret for SSH key encryption (recommended in production).
  # If empty, SESSION_SECRET is used as fallback (backward compatible).
  # WARNING: changing this after SSH keys have been uploaded will require re-uploading all SSH keys.
  encryptionSecret: ""
  idleTimeout: 0
  pollInterval: 30

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: hive.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# PodDisruptionBudget
# Single replica with SQLite. PDB allows disruption since HA is not supported.
# maxUnavailable: 1 means node drain can proceed (pod may be evicted).
# Set maxUnavailable: 0 to prevent involuntary eviction and block node drain.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

metrics:
  enabled: false
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

backup:
  enabled: false
  schedule: "0 2 * * *"  # daily at 2am
  retention: 7            # keep N most recent backup files (PVC mode only)
  storage:
    type: pvc             # or s3
    pvc:
      size: 1Gi
      storageClass: ""
    s3:
      endpoint: ""
      bucket: ""
      prefix: "backups/"
      secretName: ""      # k8s secret with keys S3_KEY_ID and S3_SECRET
