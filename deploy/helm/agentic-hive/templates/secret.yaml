{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "agentic-hive.fullname" .)) -}}
{{- $sessionSecret := "" -}}
{{- if .Values.config.sessionSecret }}
  {{- $sessionSecret = .Values.config.sessionSecret }}
{{- else if and $existingSecret $existingSecret.data }}
  {{- $sessionSecret = (index $existingSecret.data "SESSION_SECRET" | b64dec) }}
{{- else }}
  {{- $sessionSecret = (randAlphaNum 64) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentic-hive.fullname" . }}
  labels:
    {{- include "agentic-hive.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ $sessionSecret | quote }}
  {{- if and (eq .Values.auth.mode "oidc") .Values.auth.oidc.clientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
  {{- if and (eq .Values.keyStore.backend "vault") .Values.keyStore.vault.token }}
  VAULT_TOKEN: {{ .Values.keyStore.vault.token | quote }}
  {{- end }}
