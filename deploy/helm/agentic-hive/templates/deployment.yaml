apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-hive.fullname" . }}
  labels:
    {{- include "agentic-hive.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agentic-hive.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentic-hive.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "agentic-hive.fullname" . }}
            - secretRef:
                name: {{ include "agentic-hive.fullname" . }}
          env:
            - name: OVERLAY_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentic-hive.fullname" . }}
                  key: SESSION_SECRET
            - name: OVERLAY_ENCRYPTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentic-hive.fullname" . }}
                  key: ENCRYPTION_SECRET
            {{- if and (eq .Values.auth.mode "oidc") .Values.auth.oidc.clientSecret }}
            - name: OVERLAY_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentic-hive.fullname" . }}
                  key: OIDC_CLIENT_SECRET
            {{- end }}
            {{- if and (eq .Values.keyStore.backend "vault") .Values.keyStore.vault.token }}
            - name: OVERLAY_VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentic-hive.fullname" . }}
                  key: VAULT_TOKEN
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agentic-hive.fullname" . }}
      {{- end }}
