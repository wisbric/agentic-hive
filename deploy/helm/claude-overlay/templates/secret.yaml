apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-overlay.fullname" . }}
  labels:
    {{- include "claude-overlay.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.config.sessionSecret }}
  SESSION_SECRET: {{ .Values.config.sessionSecret | quote }}
  {{- else }}
  SESSION_SECRET: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- if and (eq .Values.auth.mode "oidc") .Values.auth.oidc.clientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
  {{- if and (eq .Values.keyStore.backend "vault") .Values.keyStore.vault.token }}
  VAULT_TOKEN: {{ .Values.keyStore.vault.token | quote }}
  {{- end }}
