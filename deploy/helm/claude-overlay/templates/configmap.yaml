apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-overlay.fullname" . }}
  labels:
    {{- include "claude-overlay.labels" . | nindent 4 }}
data:
  OVERLAY_LISTEN: ":8080"
  OVERLAY_DB_PATH: "/data/overlay.db"
  OVERLAY_AUTH_MODE: {{ .Values.auth.mode | quote }}
  OVERLAY_POLL_INTERVAL: {{ .Values.config.pollInterval | quote }}
  OVERLAY_IDLE_TIMEOUT: {{ .Values.config.idleTimeout | quote }}
  OVERLAY_KEYSTORE_BACKEND: {{ .Values.keyStore.backend | quote }}
  {{- if eq .Values.auth.mode "oidc" }}
  OVERLAY_OIDC_ISSUER_URL: {{ .Values.auth.oidc.issuerUrl | quote }}
  OVERLAY_OIDC_CLIENT_ID: {{ .Values.auth.oidc.clientId | quote }}
  OVERLAY_OIDC_REDIRECT_URL: {{ .Values.auth.oidc.redirectUrl | quote }}
  OVERLAY_OIDC_ROLES_CLAIM: {{ .Values.auth.oidc.rolesClaim | quote }}
  OVERLAY_OIDC_ADMIN_GROUP: {{ .Values.auth.oidc.adminGroup | quote }}
  {{- end }}
  {{- if eq .Values.keyStore.backend "vault" }}
  OVERLAY_VAULT_ADDR: {{ .Values.keyStore.vault.address | quote }}
  OVERLAY_VAULT_SECRET_PATH: {{ .Values.keyStore.vault.secretPath | quote }}
  {{- end }}
