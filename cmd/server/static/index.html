<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Hive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Setup mode -->
    <div id="setup-view" class="view" style="display:none">
      <div class="card centered">
        <h1>Agentic Hive Setup</h1>
        <p>Create your admin account to get started.</p>
        <form id="setup-form">
          <input type="text" id="setup-username" placeholder="Username" required autocomplete="username">
          <input type="password" id="setup-password" placeholder="Password" required autocomplete="new-password">
          <button type="submit">Create Admin</button>
        </form>
        <div id="setup-error" class="error"></div>
      </div>
    </div>

    <!-- Login -->
    <div id="login-view" class="view" style="display:none">
      <div class="card centered">
        <div class="login-logo">
          <img src="/static/img/owl-logo.png" alt="Agentic Hive" height="64">
        </div>
        <h1>Agentic Hive</h1>
        <form id="login-form">
          <input type="text" id="login-username" placeholder="Username" required autocomplete="username">
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
          <button type="submit">Login</button>
        </form>
        <div id="login-sso" style="display:none">
          <div class="divider"><span>or</span></div>
          <a href="/api/auth/oidc/login" class="btn btn-secondary">Login with SSO</a>
        </div>
        <div id="login-error" class="error"></div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-view" class="view" style="display:none">
      <header>
        <div class="header-left">
          <img src="/static/img/owl-logo.png" alt="Agentic Hive" height="32">
          <h1>Agentic Hive</h1>
        </div>
        <div class="header-right">
          <button id="refresh-btn" class="btn-small" onclick="refreshDashboard()" title="Refresh servers and sessions">&#8635; Refresh</button>
          <span id="current-user"></span>
          <button id="logout-btn" class="btn-small">Logout</button>
        </div>
      </header>

      <main>
        <div id="servers-list"></div>

        <div id="add-server-section" style="display:none">
          <h2>Add Server</h2>
          <form id="add-server-form" class="card">
            <input type="text" id="server-name" placeholder="Display name" required>
            <input type="text" id="server-host" placeholder="Hostname or IP" required>
            <input type="number" id="server-port" placeholder="Port (22)" value="22">
            <input type="text" id="server-user" placeholder="SSH user" required>
            <textarea id="server-key" placeholder="Paste SSH private key" rows="6" required></textarea>
            <button type="submit">Add Server</button>
          </form>
        </div>

        <button id="show-add-server" class="btn">+ Add Server</button>

        <!-- Admin Section (only visible to admins) -->
        <div id="admin-section" style="display:none">
          <h2 class="section-title">Admin</h2>

          <div class="admin-grid">
            <div class="admin-card">
              <h3>Configuration</h3>
              <div class="config-info">
                <div class="config-row">
                  <span class="config-label">Auth Mode</span>
                  <span class="config-value" id="admin-config-auth">—</span>
                </div>
                <div class="config-row">
                  <span class="config-label">Key Store</span>
                  <span class="config-value" id="admin-config-keystore">—</span>
                </div>
                <div class="config-row">
                  <span class="config-label">Poll Interval</span>
                  <span class="config-value" id="admin-config-poll">—</span>
                </div>
              </div>
            </div>

            <div class="admin-card">
              <h3>Users</h3>
              <div id="admin-users-list">Loading...</div>
            </div>
          </div>

          <!-- Settings Section -->
          <h2 class="section-title" style="margin-top:32px">Settings</h2>

          <div class="settings-card">
            <div class="settings-header" onclick="toggleSettings('oidc')">
              <h3>OIDC / Keycloak</h3>
              <span class="chevron" id="chevron-oidc">&#9654;</span>
            </div>
            <div class="settings-body" id="settings-body-oidc">
              <form id="oidc-settings-form">
                <label id="lbl-oidc-issuer-url">Issuer URL</label>
                <input type="url" id="oidc-issuer-url" placeholder="https://auth.example.com/realms/hive">
                <label id="lbl-oidc-client-id">Client ID</label>
                <input type="text" id="oidc-client-id" placeholder="agentic-hive">
                <label id="lbl-oidc-client-secret">Client Secret</label>
                <input type="password" id="oidc-client-secret" placeholder="Leave blank to keep current">
                <label id="lbl-oidc-redirect-url">Redirect URL</label>
                <input type="url" id="oidc-redirect-url" placeholder="https://hive.example.com/api/auth/oidc/callback">
                <label id="lbl-oidc-roles-claim">Roles Claim</label>
                <input type="text" id="oidc-roles-claim" placeholder="groups">
                <label id="lbl-oidc-admin-group">Admin Group</label>
                <input type="text" id="oidc-admin-group" placeholder="overlay-admin">
                <div class="settings-actions">
                  <button type="button" id="test-oidc-btn" class="btn-small" onclick="testOIDC()">Test Connection</button>
                  <button type="submit" class="btn">Save</button>
                </div>
                <div id="oidc-status" class="settings-status"></div>
              </form>
            </div>
          </div>

          <div class="settings-card">
            <div class="settings-header" onclick="toggleSettings('vault')">
              <h3>Vault / OpenBao</h3>
              <span class="chevron" id="chevron-vault">&#9654;</span>
            </div>
            <div class="settings-body" id="settings-body-vault">
              <form id="vault-settings-form">
                <label id="lbl-vault-address">Vault Address</label>
                <input type="url" id="vault-address" placeholder="https://vault.example.com">
                <label id="lbl-vault-token">Token</label>
                <input type="password" id="vault-token" placeholder="Leave blank to keep current">
                <label id="lbl-vault-secret-path">Secret Path</label>
                <input type="text" id="vault-secret-path" placeholder="secret/global/opnsense-golden-image">
                <div class="settings-actions">
                  <button type="button" id="test-vault-btn" class="btn-small" onclick="testVault()">Test Connection</button>
                  <button type="submit" class="btn">Save</button>
                </div>
                <div id="vault-status" class="settings-status"></div>
              </form>
            </div>
          </div>

          <div class="settings-card">
            <div class="settings-header" onclick="toggleSettings('general')">
              <h3>General</h3>
              <span class="chevron" id="chevron-general">&#9654;</span>
            </div>
            <div class="settings-body" id="settings-body-general">
              <form id="general-settings-form">
                <label id="lbl-general-poll-interval">Poll Interval (seconds)</label>
                <input type="number" id="general-poll-interval" placeholder="30" min="5" max="300">
                <div class="settings-actions">
                  <button type="submit" class="btn">Save</button>
                </div>
                <div id="general-status" class="settings-status"></div>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
