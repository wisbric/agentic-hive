<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal — Agentic Hive</title>
  <link rel="stylesheet" href="/static/js/vendor/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0F0D; overflow: hidden; }
    #top-bar {
      height: 30px;
      background: #111916;
      color: #8B9A91;
      display: flex;
      align-items: center;
      padding: 0 14px;
      font: 12px/1 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      border-bottom: 1px solid #1E2E27;
      gap: 10px;
    }
    #top-bar .owl-icon { display: flex; align-items: center; opacity: 0.7; }
    #top-bar .session-info { flex: 1; color: #E8ECE9; }
    #top-bar .status { color: #00e5a0; }
    #top-bar .status.disconnected { color: #DC2626; }
    #terminal-container { height: calc(100vh - 30px); }
    #reconnect-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      justify-content: center;
      align-items: center;
    }
    #reconnect-overlay.show { display: flex; }
    #reconnect-overlay button {
      padding: 12px 28px;
      background: #00e5a0;
      border: none;
      color: #0A0F0D;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      cursor: pointer;
      border-radius: 6px;
    }
    #reconnect-overlay button:hover { background: #00C88A; }
  </style>
</head>
<body>
  <div id="top-bar">
    <span class="owl-icon">
      <img src="/static/img/owl-logo.png" alt="" height="16">
    </span>
    <span class="session-info" id="session-info">connecting...</span>
    <span class="status" id="status">connected</span>
  </div>
  <div id="terminal-container"></div>
  <div id="reconnect-overlay">
    <button onclick="reconnect()">Reconnect</button>
  </div>

  <script src="/static/js/vendor/xterm.js"></script>
  <script src="/static/js/vendor/xterm-addon-fit.js"></script>
  <script src="/static/js/terminal.js"></script>
</body>
</html>
